<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">

    <title>Frontend Mentor | Expenses chart component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>

<body>
    <main class="container">
        <!-- CARD 1: BALANCE -->
        <section class="balance">
            <div class="balance-text">
                <p class="balance-label">My balance</p>
                <h2 class="balance-amount">$921.48</h2>
            </div>
            <div class="balance-logo">.
                <div class="circle-left"></div>
                <div class="circle-right"></div>
            </div>
        </section>
        <!-- CARD 2:BAR CHART -->
        <section class="chart-card">
            <h1 class="chart-title">Spending - Last 7 days</h1>

            <div class="bar-chart" id="chart"></div>
            <div class="divider"></div>
            <!-- BAR FOOTER -->
            <div class="chart-footer">
                <div>
                    <p class="total">Total this month</p>
                    <h1>$478.33</h1>
                </div>

                <div class="chart-footer-right">
                    <p class="percent">+2.4%</p>
                    <p class="text">from last month</p>
                </div>
            </div>
        </section>
        <div class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
            Coded by <a href="#">Miracle Onyibor</a>.
        </div>
    </main>
    <script src="main.js"></script>


</body>

</html>
